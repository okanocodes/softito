<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  <body
    class="bg-indigo-50 text-gray-800 font-sans min-h-screen p-8 flex flex-col items-center justify-center gap-6"
  >
    <div class="text-center max-w-md">
      <div>
        <h1 class="text-xl font-bold text-gray-900 mb-2">
          Fiyatlandırma Kartı Flex Column
        </h1>
        <p class="text-xs text-gray-500">
          Kart elemanları üst üste sıralamak için flex-col, öne çıkan rozeti en
          üstte göstermek için order-first sınıfı kullanacağız.
        </p>
      </div>

      <div
        class="w-full max-w-xs bg-white border border-gray-200 rounded-2xl p-6 flex flex-col gap-4 shadow-sm"
      >
        <div>
          <h2 class="text-sm font-bold text-gray-800">Standart Paket</h2>
          <p class="text-2xl font-extrabold text-gray-900 mt-1">99 TL / Ay</p>
        </div>
        <div
          class="px-2.5 py-1 bg-indigo-100 border border-indigo-200 text-indigo-700 text-[9px] font-extrabold rounderd-full self-start order-first uppercase tracking-wide"
        >
          En Popüler Paket(Order-first)
        </div>
        <div class="text-xs text-gray-500 space-y-2 border border-gray-100 pt-4 ">
          <p>1 Sınırsız Proje</p>
          <p>25 tane kişisel proje</p>
          <p>Grup Çalışması</p>
        </div>
        <button class="w-full py-2 bg-indigo-600 hover:bg-indigo-700 text-white rounded-lg text-xs font-semibold transition-colors mt-2">Satın al</button>
      </div>
    </div>
  </body>
</html>
