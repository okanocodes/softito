<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  <body
    class="bg-gray-50 text-gray-800 font-sans min-h-screen p-6 flex flex-col items-center justify-center gap-6"
  >
    <div class="text-center max-w-md">
      <h1 class="text-xl font-bold text-gray-900 mb-2">Navigasyon</h1>
      <p class="text-xs text-gray-500">Mobilde gizlenen hamburger menü</p>
    </div>

    <nav
      class="w-full max-w-md bg-white border border-gray-200 rounded-xl p-4 shadow-sm"
    >
      <div class="flex items-center justify-between">
        <div class="flex items-center gap-2">
          <span class="font-extrabold text-xs tracking-wider text-indigo-600">
            Okan Şahin
          </span>
        </div>
        <div class="hidden md:flex gap-4 text-[10px] font-bold text-gray-500">
          <span class="text-indigo-600 cursor-pointer">Hakkında</span>
          <span class="hover:text-gray-900 text-indigo-600 cursor-pointer"
            >Hizmetler</span
          >

          <span class="hover:text-gray-900 text-indigo-600 cursor-pointer"
            >Projeler</span
          >
          <span class="hover:text-gray-900 text-indigo-600 cursor-pointer"
            >İletişim</span
          >
        </div>

        <button onclick="toggleMenu()" class="block md:hidden px-3 py-1 bg-gray-50 border border-gray-200 rounded text-[9ox] font-extrabold text-gray-700 hover:bg-gray-100 transition-colors">
            Menü
        </button>
       
      </div>
       <div id="mobile-menu" class="hidden mt-4 pt-4 border-t border-gray-100 flex-col gap-2 text-xs font-semibold text-gray-650">
            <span class="text-indigo-600 cursor-pointer py-1 block">Hakkımızda</span>
            <span class="text-indigo-900 cursor-pointer py-1 block">Hizmetler</span>
            <span class="text-indigo-900 cursor-pointer py-1 block">Projeler</span>
            <span class="text-indigo-900 cursor-pointer py-1 block">İletişim</span>
        </div>
    </nav>
    <div class="text-[10px] text-slate-500 text-center font-mono">
        Mobil ve masaüstü geçişleri pencere daraltın gençler :)
    </div>

    <script>
        function toggleMenu(){
            const menu = document.getElementById('mobile-menu')
            if(menu.classList.contains('hidden')){
                menu.classList.remove('hidden')
                menu.classList.add('flex')
            } else {
                menu.classList.remove('flex')
                menu.classList.add('hidden')
            }
        }

    </script>
  </body>
</html>
