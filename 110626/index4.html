<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/typescript/5.0.4/typescript.min.js"></script>
  </head>
  <body class="p-6 bg-gray-100">
    <div class="p-6 ">
        <h1 class="text-xl">Arayüz (Interface) Yapısı</h1>

        <div class="mb-4">
            <input id="prod-name" class="p-1 border" placeholder="Ürün Adı" type="text">
            <input type="number" class="p-1 border" placeholder="Fiyat" id="prod-price">
        </div>
        <button id="btn-add" class="p-2 bg-blue-200">Ürün ekle</button>
        <ul id="product-list" class="list-disc pl-5 space-y-1"></ul>
    </div>




    <script>
      window.addEventListener("DOMContentLoaded", () => {
        document
          .querySelectorAll('script[type="text/typescript"]')
          .forEach((script) => {
            const js = window.ts.transpile(script.textContent);
            const newScript = document.createElement("script");
            newScript.textContent = js;
            document.body.appendChild(newScript);
          });
      });
    </script>

    <script type="text/typescript">
        interface Urun {
            id: number;
            ad: string;
            fiyat: number;
        }

        const urunler: Urun[] = [
            {
                id: 1,
                ad: 'Defter',
                fiyat: 40
            },
            {
                id: 2,
                ad: 'Kalem',
                fiyat: 20
            }
        ]


        const listElement = document.getElementById('product-list') as HTMLLIElement

        const listeyiCiz = () => {
            listElement.innerHTML = ''
            urunler.forEach(u => {
                const li = document.createElement('li')
                li.innerText = u.ad + " - Fiyat: " + u.fiyat + " TL (Ürün Kodu " + u.id + ")"
                listElement.appendChild(li)
            })
        }

        listeyiCiz()

        document.getElementById('btn-add').addEventListener('click', () => {


            const nameInp = document.getElementById('prod-name') as HTMLInputElement
            const priceInp = document.getElementById('prod-price') as HTMLInputElement

            const adValue = nameInp.value
            const fiyatValue = Number(priceInp.value)

            if(adValue && !isNaN(fiyatValue)){
                const yeniUrun: Urun = {
                    id: urunler.length+1,
                    ad: adValue,
                    fiyat: fiyatValue
                }

                urunler.push(yeniUrun)
                listeyiCiz()

                priceInp.value = ''
                nameInp.value = ''
            }


        })
        
    </script>
  </body>
</html>
