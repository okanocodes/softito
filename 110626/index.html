<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Typescript Giriş</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/typescript/5.0.4/typescript.min.js"></script>
  </head>
  <body class="p-6 bg-gray-100">
    <div class="p-6 bg-white">
      <h1 class="text-xl font-bold">Typescript Temel Tipleri</h1>
      <div class="mb-4">
        <label for="" class="block text-xs">Öğrenci Adı</label>
        <input type="text" id="input-name" value="ahmet" class="p-1 border" />
      </div>
      <div class="mb-4">
        <label for="" class="block text-xs">Öğrenci Yaşı</label>
        <input
          type="number"
          name=""
          id="input-age"
          value="16"
          class="p-1 border"
        />
      </div>
      <div class="mb-4">
        <label for="" class="block text-xs">Öğrenci mi?</label>
        <input type="checkbox" name="" id="input-student" checked class="p-1" />
      </div>
      <button id="btn-run" class="p-2 bg-indigo-200">Verileri işle</button>
      <div id="result" class="mt-4 p-2">Sonuç bekleniyor</div>
    </div>

    <script>
      window.addEventListener("DOMContentLoaded", () => {
        document
          .querySelectorAll('script[type="text/typescript"]')
          .forEach((script) => {
            const js = window.ts.transpile(script.textContent);
            const newScript = document.createElement("script");
            newScript.textContent = js;
            document.body.appendChild(newScript);
          });
      });
    </script>

    <script type="text/typescript">

      const output = document.getElementById('result') as HTMLDivElement


      document.getElementById('btn-run').addEventListener('click', ()=> {


          const ad: string = (document.getElementById('input-name') as HTMLInputElement).value

          const yas: number = Number((document.getElementById('input-age') as HTMLInputElement).value)

          const ogrenciMi: boolean = (document.getElementById('input-student') as HTMLInputElement).checked


          const hamVeri: any = "işlem tamamlandı"
          output.className = 'mt-4 bg-green-200'
          output.innerText = hamVeri+"Ad:" + ad + ", Yaş: " + yas + ", Öğrenci Durumu: " +(ogrenciMi ? 'Öğrenci' : 'Değil')
      })
    </script>
  </body>
</html>
