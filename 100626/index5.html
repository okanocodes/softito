<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  <body class="p-6 bg-gray-100">
    <div class="p-6 bg-white">
      <h1 class="text-xl front-bold">Async / Await</h1>
      <button id="btn-run" class="p-2 bg-pink-200">Siparişi Getir</button>
      <div id="result" class="mt-4 whitespace-pre-line">
        İşlem Bekleniyor...
      </div>
    </div>

    <script>
        const kullaniciyiGetir = () => {
            return new Promise((resolve)=> {
                setTimeout(()=> resolve({id:42, ad:'onur'}), 1000)
            })
        }

        const sepetiGetir = (kullanici) => {
            return new Promise((resolve)=>{
                setTimeout(()=> resolve({sahip: kullanici.ad, urunler:['Cep Telefonu', 'Macboook']}), 1000)
            })
        }

        const faturaHesapla = (sepet) => {
            return new Promise((resolve)=>{
                setTimeout(() => resolve(`Müşteri: ${sepet.sahip}\nÜrünler: ${sepet.urunler.join(', ')}\nFatura Tutarı 2500 TL`), 1000)
            })
        }

        const siparisSureciniYonet = async () => {
            const output = document.getElementById('result')

            output.innerText = 'Süreç başlatıldı...'

            const kullanici = await kullaniciyiGetir();
            output.innerText = `Kullanıcı Alındı: ${kullanici.ad}\nSepet Yükleniyor`

            const sepet = await sepetiGetir(kullanici)
            output.innerText = `Sepet alındı: ${sepet.urunler.join(',')}\nFatura Çıkarılıyor....`

            const fatura = await faturaHesapla(sepet)
            output.innerText = fatura

        }

        document.getElementById('btn-run').addEventListener('click', siparisSureciniYonet)
    </script>
  </body>
</html>
