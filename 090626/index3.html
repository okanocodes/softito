<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div>
        <h1>Property ile method</h1>
        <p></p>
    </div>
    <div>
        <h3>Nesne oluşturma </h3>
        <div>
            <label for="input-brand">Marka</label>
            <input type="text" id="input-brand" value="Apple" />
        </div>
        <div>
            <label for="">Fiyat</label>
            <input type="number" id="input-price" value="50000">
        </div>
    </div>
    <div>
        <button style="border:3px" id="btn-build">Oluştur</button>
        <div id="result">Oluşturulmadı</div>
    </div>

    <script>
        const result = document.getElementById('result')

        document.getElementById('btn-build').addEventListener('click', () => {
            const marka = document.getElementById('input-brand').value
            const fiyat = document.getElementById('input-price').value

            const cihaz = {
                marka,
                fiyat,
                bilgi(){
                    return `${this.marka} markalı cihaz, ${this.fiyat} TL fiyatındadır.`
                }
            }

            result.innerHTML = `
            <div>Oluşan Nesne: ${JSON.stringify({marka: cihaz.marka, fiyat: cihaz.fiyat})}</div>
            <div>cihaz.bilgi() sonucu: <span>${cihaz.bilgi()}</span></div>
            ` 

        })
    </script>
</body>
</html>
