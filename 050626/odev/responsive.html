<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Responsive design with Tailwind CSS</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>

  <body class="bg-slate-100 p-8 flex flex-col items-center">
    <div
      class="max-w-xl w-full bg-white p-6 rounded-md shadow-xl gap-10 flex flex-col"
    >
      <section>
        <h1 class="text-2xl text-slate-400 font-bold mb-1">
          1 - flex flex-wrap
        </h1>
        <div class="relative my-4">
          <pre
            class="rounded-lg p-4 bg-gray-800 font-mono text-sm text-gray-100 overflow-x-auto"
          >
        <code class="language-html" id="flex-wrap" ></code>
      </pre>
          <div
            class="absolute top-2 left-2 bg-gray-900 px-2 py-1 rounded text-gray-400 text-sm"
          >
            HTML
          </div>
        </div>
        <div
          class="text-white flex flex-wrap gap-4 bg-slate-55 p-3 border rounded"
        >
          <div class="bg-blue-500 p-3 rounded">Kutu 1</div>
          <div class="bg-yellow-500 p-3 rounded">Kutu 2</div>
          <div class="bg-red-500 p-3 rounded">Kutu 3</div>
        </div>
      </section>

      <section>
        <h1 class="text-2xl text-slate-400 font-bold mb-1">
          2 - flex-col md:flex-row
        </h1>
        <div class="relative my-4">
          <pre
            class="rounded-lg p-4 bg-gray-800 font-mono text-sm text-gray-100 overflow-x-auto"
          >
        <code class="language-html" id="flex-col-md-flex-row" ></code>
         </pre>
          <div
            class="absolute top-2 left-2 bg-gray-900 px-2 py-1 rounded text-gray-400 text-sm"
          >
            HTML
          </div>
        </div>
        <div
          class="text-white flex flex-col md:flex-row gap-4 bg-slate-55 p-3 border rounded"
        >
          <div class="bg-blue-500 p-3 rounded">Kutu 1</div>
          <div class="bg-yellow-500 p-3 rounded">Kutu 2</div>
          <div class="bg-red-500 p-3 rounded">Kutu 3</div>
        </div>
      </section>

      <section>
        <h1 class="text-2xl text-slate-400 font-bold mb-1">
          3 - grid grid-cols-[repeat(auto-fit,_minmax(150px,_1fr))]
        </h1>
        <div class="relative my-4">
          <pre
            class="rounded-lg p-4 bg-gray-800 font-mono text-sm text-gray-100 overflow-x-auto"
          >
        <code class="language-html" id="grid-cols" ></code>
      </pre>
          <div
            class="absolute top-2 left-2 bg-gray-900 px-2 py-1 rounded text-gray-400 text-sm"
          >
            HTML
          </div>
        </div>
        <div
          class="text-white grid grid-cols-[repeat(auto-fit,_minmax(150px,_1fr))] gap-4 bg-slate-55 p-3 border rounded"
        >
          <div class="bg-blue-500 p-3 rounded">Kutu 1</div>
          <div class="bg-yellow-500 p-3 rounded">Kutu 2</div>
          <div class="bg-red-500 p-3 rounded">Kutu 3</div>
        </div>
      </section>

      <section>
        <h1 class="text-2xl text-slate-400 font-bold mb-1">
          4 - grid grid-cols-1 md:grid-cols-3
        </h1>
        <div class="relative my-4">
          <pre
            class="rounded-lg p-4 bg-gray-800 font-mono text-sm text-gray-100 overflow-x-auto"
          >
        <code class="language-html" id="grid-cols-1-md-grid-cols-3" ></code>
      </pre>
          <div
            class="absolute top-2 left-2 bg-gray-900 px-2 py-1 rounded text-gray-400 text-sm"
          >
            HTML
          </div>
        </div>
        <div
          class="text-white grid grid-cols-1 md:grid-cols-3 gap-4 bg-slate-55 p-3 border rounded"
        >
          <div class="bg-blue-500 p-3 rounded">Kutu 1</div>
          <div class="bg-yellow-500 p-3 rounded">Kutu 2</div>
          <div class="bg-red-500 p-3 rounded">Kutu 3</div>
        </div>
      </section>
    </div>

    <script>
      const codeElement = document.getElementById("flex-wrap");
      codeElement.textContent = `
      <div
        class="text-white flex flex-wrap gap-4 bg-slate-55 p-3 border rounded"
      >
       ...
       ...
       ...
      </div>
      `;

      const codeElement2 = document.getElementById("flex-col-md-flex-row");
      codeElement2.textContent = `
      <div
        class="text-white flex flex-col md:flex-row gap-4 bg-slate-55 p-3 border rounded"
      >
       ...
       ...
       ...
      </div>
      `;

      const codeElement3 = document.getElementById("grid-cols");
      codeElement3.textContent = `
      <div
        class="text-white grid grid-cols-[repeat(auto-fit,_minmax(150px,_1fr))] gap-4 bg-slate-55 p-3 border rounded"
      >
       ...
       ...
       ...
      </div>
      `;

      const codeElement4 = document.getElementById(
        "grid-cols-1-md-grid-cols-3",
      );
      codeElement4.textContent = `
      <div
        class="text-white grid grid-cols-1 md:grid-cols-3 gap-4 bg-slate-55 p-3 border rounded"
      >
       ...
       ...
       ...
      </div>
      `;
    </script>
  </body>
</html>
