<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.tailwindcss.com"></script>

    <title>Form</title>


  </head>
  <body class="bg-slate-100 p-8 flex justify-center">
    <div class="max-w-sm w-full bg-white p-6 rounded shadow">
      <h1 class="text-xl font-bold mb-8 text-slate-800">Giriş Yap</h1>
      <form class="space-y-4"> 
  
        <div>
          <label for="email" class="text-xs text-slate-600 mb-1 block">E posta</label>
          <!-- <input type="text" id="email" class="block min-w-0 grow py-1.5 pr-3 pl-1 text-base text-gray-900 placeholder:text-gray-400 focus:outline- sm:text-sm/6"> -->
           <input class="w-full border p-2 rounded text-sm focus:outline-none focus:border-blue-500" type="text" placeholder="Eposta Adresinizi Giriniz" name="email" id="email">
        </div>
        <div>
          <label for="password" class="text-xs text-slate-600 mb-1 block">Şifre</label>
          <input class="w-full border p-2 rounded text-sm focus:outline-none focus:border-blue-500" type="password" id="password" placeholder="*******">
        </div>
        <button type="submit" class="w-full bg-blue-500 text-white font-semibold py-2 rounded hover:bg-blue-600">Giriş Yap</button>
      </form>


    </div>
  </body>
</html>
